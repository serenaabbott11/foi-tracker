<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <base href="./">
  <title>Sign in — FOI Deadline Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; color: #0b0c0c; }
    h1 { border-bottom: 4px solid #1d70b8; padding-bottom: .3rem; margin: 0 0 1.5rem 0; }
    label { display: block; margin: 1rem 0 .3rem; font-weight: bold; }
    input { padding: .5rem; border: 2px solid #0b0c0c; font-size: 1rem; width: 100%; box-sizing: border-box; }
    button { background: #00703c; color: #fff; border: 0; padding: .6rem 1.2rem; font-size: 1rem; cursor: pointer; margin-top: 1.5rem; }
    .error { background: #fbeaea; border-left: 4px solid #d4351c; padding: .7rem 1rem; margin: 1rem 0; color: #0b0c0c; }
    .hint { color: #505a5f; font-size: .85rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>FOI Deadline Tracker — Sign in</h1>

  {% if error %}<p class="error">{{ error }}</p>{% endif %}

  <form method="post" action="{{ url_for('login_post') }}">
    <input type="hidden" name="next" value="{{ next or '' }}">
    <label for="username">Username</label>
    <input id="username" name="username" required autocomplete="username" autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>

  <p class="hint">Access is restricted to Department for Transport FOI team members. All access is audit-logged.</p>
</body>
</html>
