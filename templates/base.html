<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FOI Deadline Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #0b0c0c; }
    h1 { border-bottom: 4px solid #1d70b8; padding-bottom: .3rem; }
    h1 a { color: inherit; text-decoration: none; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #b1b4b6; padding: .5rem .6rem; text-align: left; }
    th { background: #f3f2f1; }
    a { color: #1d70b8; }
    .overdue { background: #fbeaea; }
    .due-soon { background: #fff7e6; }
    .status { display: inline-block; background: #f3f2f1; border: 1px solid #b1b4b6; padding: 1px 8px; font-size: .85rem; }
    form.inline { display: inline; }
    label { display: block; margin: .8rem 0 .2rem; font-weight: bold; }
    input[type=text], input[type=date], select, textarea { padding: .5rem; border: 2px solid #0b0c0c; font-size: 1rem; width: 100%; max-width: 420px; box-sizing: border-box; }
    button { background: #00703c; color: #fff; border: 0; padding: .6rem 1.2rem; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
    .hint { color: #505a5f; font-size: .85rem; }
  </style>
</head>
<body>
  <h1><a href="/">FOI Deadline Tracker</a></h1>
  {% block content %}{% endblock %}
</body>
</html>
