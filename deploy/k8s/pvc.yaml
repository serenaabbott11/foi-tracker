# ⚠️ Aspirational — not applied. See deploy/k8s/README.md.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foi-tracker-data
spec:
  # SQLite requires a real POSIX filesystem — RWO to a block-storage
  # provisioner (e.g. AWS EBS, GCE PD, local-path). NFS-backed
  # ReadWriteMany would corrupt the DB under load.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foi-tracker-backups
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
